<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flagoku — Le jeu des pays</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ed;--surface:#fff;--border:#ddd9d0;--border2:#c5bfb3;
  --text:#1c1a16;--text2:#6b6560;--text3:#a39d95;
  --green:#2a6342;--gbg:#e8f2ec;--gbd:#8dbfa0;
  --red:#b53020;--rbg:#fbeeed;--rbd:#dda090;
  --r1:#b0bec5;--r2:#f6a623;--r3:#e05c30;--r5:#8b5cf6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}

header{width:100%;max-width:680px;padding:22px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--green)}
.hright{display:flex;align-items:center;gap:8px}
.dlbl{font-size:12px;color:var(--text3);font-weight:500}
.dbadge{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1.5px solid}
.d-easy{background:#e6f4ec;color:#1a5c35;border-color:#7ab895}
.d-medium{background:#fef4e6;color:#7a4500;border-color:#e8a840}
.d-hard{background:#fdecea;color:#8b2010;border-color:#d88070}
.d-vhard{background:#f0eaff;color:#4a1d96;border-color:#a080d8}

main{width:100%;max-width:680px;padding:18px 16px 48px}

/* Grid */
.grid{display:grid;grid-template-columns:118px repeat(3,1fr);grid-template-rows:auto repeat(3,1fr);gap:5px;margin-bottom:14px}
.corner{background:transparent}
.col-hd{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:9px 7px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;min-height:80px;justify-content:center}
.col-flags{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;line-height:1}
.col-flag{font-size:15px}
.ct{font-size:10.5px;color:var(--text2);line-height:1.3;font-weight:500}
.row-hd{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;display:flex;flex-direction:column;justify-content:center;gap:2px;min-height:88px}
.rc{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600}
.rv{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.25}

.cell{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;min-height:88px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .13s,background .13s,transform .1s;position:relative;overflow:hidden}
.cell:hover:not(.filled):not(.locked){border-color:var(--border2);background:#faf9f6;transform:scale(1.015)}
.cell:active:not(.filled):not(.locked){transform:scale(.97)}
.cell.filled{background:var(--gbg);border-color:var(--gbd);cursor:default}
.cell.locked{background:#f8f5f2;opacity:.5;cursor:not-allowed}
.cell.wrong{animation:shake .32s ease}
.cell.pop{animation:pop .28s ease}
.plus{font-size:20px;color:var(--border2)}
.cell:hover:not(.filled):not(.locked) .plus{color:var(--text3)}
.cans{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px;text-align:center}
.aflag{font-size:24px;line-height:1}
.aname{font-size:11px;font-weight:600;color:var(--green);line-height:1.25;max-width:90px}
.apts{font-size:10px;color:var(--green);background:white;border:1px solid var(--gbd);border-radius:999px;padding:1px 7px;font-weight:500}
.rpip{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%}
.rp1{background:var(--r1)}.rp2{background:var(--r2)}.rp3{background:var(--r3)}.rp5{background:var(--r5)}

/* Scorebar */
.scorebar{display:flex;background:var(--surface);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:11px}
.sbb{flex:1;padding:11px 14px;display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--border)}
.sbb:last-child{border-right:none}
.sbv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.sbl{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.tdots,.pdots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center}
.tdot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border2);transition:background .2s,border-color .2s}
.tdot.used{background:var(--rbg);border-color:var(--rbd)}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border2);transition:background .25s}
.pdot.done{background:var(--green);border-color:var(--green)}
.pdot.dead{background:var(--border);border-color:var(--border)}

/* Legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text3)}
.lp{width:8px;height:8px;border-radius:50%}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,.42);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:370px;animation:mIn .18s ease}
@keyframes mIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mtitle{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px}
.msub{font-size:11.5px;color:var(--text3);margin-bottom:13px}
.crit{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;line-height:1.6;margin-bottom:12px;color:var(--text2)}
.crit strong{color:var(--text);font-weight:600}
.mtries{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text3);margin-bottom:9px}
.mtd{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--border2)}
.mtd.used{background:var(--rbg);border-color:var(--rbd)}
.rhint{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-bottom:10px}
.selc{display:none;align-items:center;gap:9px;padding:9px 12px;background:var(--gbg);border:1.5px solid var(--gbd);border-radius:8px;margin-bottom:9px}
.selc.on{display:flex}
.selcflag{font-size:20px;line-height:1}
.selcname{flex:1;font-weight:600;font-size:13.5px}
.selclear{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;padding:1px 3px;line-height:1;border-radius:4px;transition:color .13s}
.selclear:hover{color:var(--text)}
.iwrap{position:relative;margin-bottom:7px}
.iwrap input{width:100%;padding:10px 13px;font-size:14.5px;font-family:'Inter',sans-serif;border:1.5px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color .13s}
.iwrap input:focus{border-color:var(--green)}
.sugs{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:9px;z-index:300;max-height:205px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.09)}
.sugs.open{display:block}
.sug{padding:9px 13px;cursor:pointer;font-size:13.5px;transition:background .1s;color:var(--text)}
.sug:hover,.sug.hi{background:var(--bg)}
.sug em{font-style:normal;font-weight:600;color:var(--green)}
.err{font-size:11.5px;color:var(--red);min-height:15px;margin-bottom:7px;font-weight:500}
.actions{display:flex;gap:7px}
.btn{padding:9px 15px;border-radius:8px;font-size:13.5px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:1.5px solid;transition:background .13s,transform .1s}
.btn:active{transform:scale(.97)}
.btnc{flex:1;background:var(--bg);border-color:var(--border2);color:var(--text2)}
.btnc:hover{background:var(--border)}
.btnok{flex:2;background:var(--green);border-color:var(--green);color:#fff}
.btnok:hover{background:#225235}
.btnok:disabled{opacity:.4;cursor:not-allowed}

/* End screen */
.end{display:none;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:26px;text-align:center;margin-top:10px}
.end.open{display:block}
.eicon{font-size:44px;margin-bottom:10px}
.etitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:5px}
.escore{font-family:'Syne',sans-serif;font-size:46px;font-weight:800;color:var(--green);line-height:1;margin:12px 0}
.esub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.65}
.sharebox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px;font-family:monospace;font-size:13px;white-space:pre;text-align:left;margin-bottom:16px;overflow-x:auto;color:var(--text);line-height:1.6}

/* Share buttons */
.share-title{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:1.5px solid;transition:background .13s,transform .1s;text-decoration:none}
.share-btn:active{transform:scale(.97)}
.sb-copy{background:var(--green);border-color:var(--green);color:#fff}
.sb-copy:hover{background:#225235}
.sb-copy.cp{background:#1a7a4a}
.sb-native{background:var(--bg);border-color:var(--border2);color:var(--text)}
.sb-native:hover{background:var(--border)}
.sb-wa{background:#25D366;border-color:#25D366;color:#fff}
.sb-wa:hover{background:#1da851}
.sb-mail{background:var(--bg);border-color:var(--border2);color:var(--text)}
.sb-mail:hover{background:var(--border)}
.sb-sms{background:var(--bg);border-color:var(--border2);color:var(--text)}
.sb-sms:hover{background:var(--border)}
.share-icon{font-size:16px;line-height:1}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}

@media(max-width:460px){
  .grid{grid-template-columns:96px repeat(3,1fr);gap:4px}
  .row-hd{min-height:76px;padding:8px}
  .rv{font-size:11.5px}
  .cell{min-height:76px}
  .share-btns{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="logo">Flag<span>oku</span></div>
  <div class="hright">
    <span class="dlbl" id="dlbl">Grille #1</span>
    <span class="dbadge d-easy" id="dbadge">Facile</span>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="scorebar">
    <div class="sbb"><span class="sbv" id="sval">0</span><span class="sbl">Points</span></div>
    <div class="sbb">
      <div class="tdots"><div class="tdot" id="td0"></div><div class="tdot" id="td1"></div><div class="tdot" id="td2"></div></div>
      <span class="sbl">Essais / case</span>
    </div>
    <div class="sbb"><div class="pdots" id="pdots"></div><span class="sbl">Cases</span></div>
  </div>
  <div class="legend">
    <div class="li"><div class="lp" style="background:var(--r1)"></div>Commun ×1</div>
    <div class="li"><div class="lp" style="background:var(--r2)"></div>Peu commun ×2</div>
    <div class="li"><div class="lp" style="background:var(--r3)"></div>Rare ×3</div>
    <div class="li"><div class="lp" style="background:var(--r5)"></div>Unique ×5</div>
  </div>
  <div class="end" id="end">
    <div class="eicon" id="eicon">🌍</div>
    <div class="etitle" id="etitle">Grille terminée !</div>
    <div class="escore" id="escore">0</div>
    <div class="esub" id="esub"></div>
    <div class="sharebox" id="sharebox"></div>
    <div class="share-title">Partager avec tes amis</div>
    <div class="share-btns">
      <button class="share-btn sb-copy" id="sb-copy" onclick="shareCopy()"><span class="share-icon">📋</span>Copier</button>
      <button class="share-btn sb-native" id="sb-native" onclick="shareNative()" style="display:none"><span class="share-icon">↗️</span>Partager</button>
      <a class="share-btn sb-wa" id="sb-wa" href="#" onclick="shareWA(event)"><span class="share-icon">💬</span>WhatsApp</a>
      <a class="share-btn sb-mail" id="sb-mail" href="#" onclick="shareMail(event)"><span class="share-icon">✉️</span>E-mail</a>
      <a class="share-btn sb-sms" id="sb-sms" href="#" onclick="shareSMS(event)"><span class="share-icon">📱</span>SMS</a>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="mtitle">Quel pays ?</div>
    <div class="msub">Trouve un pays qui satisfait les deux critères</div>
    <div class="crit" id="crit"></div>
    <div class="mtries">
      <div class="mtd" id="mt0"></div><div class="mtd" id="mt1"></div><div class="mtd" id="mt2"></div>
      <span id="ttxt">3 essais restants</span>
    </div>
    <div class="rhint" id="rhint"></div>
    <div class="selc" id="selc">
      <span class="selcflag" id="scflag"></span>
      <span class="selcname" id="scname"></span>
      <button class="selclear" onclick="clearSel()" aria-label="Effacer">✕</button>
    </div>
    <div class="iwrap" id="iwrap">
      <input type="text" id="inp" placeholder="Tape un pays…" autocomplete="off"/>
      <div class="sugs" id="sugs"></div>
    </div>
    <div class="err" id="err"></div>
    <div class="actions">
      <button class="btn btnc" onclick="closeModal()">Annuler</button>
      <button class="btn btnok" id="bok" onclick="submit()" disabled>Valider →</button>
    </div>
  </div>
</div>

const BASE=[0,100,60,30];
const CM={1:1,2:2,3:3,4:3,5:5};
const BONUS=200,MAX_T=3;
const PIP={1:"rp1",2:"rp2",3:"rp3",4:"rp3",5:"rp5"};
const CLBL={1:"Commun ×1",2:"Peu commun ×2",3:"Rare ×3",5:"Unique ×5"};
const DCLS={easy:"d-easy",medium:"d-medium",hard:"d-hard",very_hard:"d-vhard"};
const PCLS=["--r1","--r2","--r3","--r3","--r5"];

let G,ST,TR,SC,aCell,selC;
const CM2=Object.fromEntries(COUNTRIES.map(c=>[c.id,c]));

function todayIdx(){
  const ep=new Date('2025-01-01').getTime();
  const t=new Date();t.setHours(0,0,0,0);
  return Math.floor((t.getTime()-ep)/86400000)%GRIDS.length;
}

function init(){
  G=GRIDS[todayIdx()];
  ST=Array.from({length:3},()=>Array(3).fill(null));
  TR=Array.from({length:3},()=>Array(3).fill(0));
  SC=0;aCell=null;selC=null;
  const sv=localStorage.getItem('fgk_'+G.id);
  if(sv){const s=JSON.parse(sv);ST=s.s;TR=s.t;SC=s.sc;}
  document.getElementById('dlbl').textContent='Grille #'+G.id;
  const db=document.getElementById('dbadge');
  db.textContent=G.difficulty_label;db.className='dbadge '+DCLS[G.difficulty];
  buildGrid();updSc();updProg();
  if(ST.flat().filter(Boolean).length===9)showEnd();
}
function save(){localStorage.setItem('fgk_'+G.id,JSON.stringify({s:ST,t:TR,sc:SC}));}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  g.appendChild(mk('div','corner'));

  // Column headers — flag emojis as examples of the criterion
  G.cols.forEach(col=>{
    const h=mk('div','col-hd');
    const flagsHtml=col.examples.map(f=>'<span class="col-flag">'+f+'</span>').join('');
    h.innerHTML='<div class="col-flags">'+flagsHtml+'</div><span class="ct">'+col.label+'</span>';
    g.appendChild(h);
  });

  G.rows.forEach((row,ri)=>{
    const rh=mk('div','row-hd');
    rh.innerHTML='<span class="rc">'+row.category+'</span><span class="rv">'+row.value+'</span>';
    g.appendChild(rh);
    G.cols.forEach((col,ci)=>{
      const cd=G.cells.find(c=>c.row===row.id&&c.col===col.id);
      const cell=mk('div','cell');
      cell.dataset.row=ri;cell.dataset.col=ci;
      cell.appendChild(Object.assign(mk('div','rpip '+PIP[cd.rc])));
      if(ST[ri][ci])fillCell(cell,ri,ci,cd);
      else if(TR[ri][ci]>=MAX_T){
        cell.classList.add('locked');
        cell.innerHTML+='<span class="plus" style="font-size:16px;color:#bbb">✕</span>';
      }else{
        cell.innerHTML+='<span class="plus">+</span>';
        cell.addEventListener('click',()=>openM(ri,ci));
      }
      g.appendChild(cell);
    });
  });
}

function fillCell(cell,ri,ci,cd){
  const c=CM2[ST[ri][ci]];
  const pts=BASE[TR[ri][ci]+1]*CM[cd.rc];
  cell.classList.add('filled');
  const d=mk('div','cans');
  d.innerHTML='<span class="aflag">'+c.flag+'</span><span class="aname">'+c.name+'</span><span class="apts">+'+pts+' pts</span>';
  cell.appendChild(d);
}

function updSc(){document.getElementById('sval').textContent=SC;}

function updTries(){
  if(!aCell)return;
  const[ri,ci]=aCell;const t=TR[ri][ci];
  for(let i=0;i<3;i++){
    document.getElementById('td'+i).className='tdot'+(i<t?' used':'');
    document.getElementById('mt'+i).className='mtd'+(i<t?' used':'');
  }
  const r=MAX_T-t;
  document.getElementById('ttxt').textContent=r+' essai'+(r>1?'s':'')+' restant'+(r>1?'s':'');
}

function updProg(){
  const d=document.getElementById('pdots');d.innerHTML='';
  let done=0;
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const dot=mk('div','pdot'+(ST[r][c]?' done':TR[r][c]>=MAX_T?' dead':''));
    d.appendChild(dot);if(ST[r][c])done++;
  }
  return done;
}

function openM(ri,ci){
  aCell=[ri,ci];
  const row=G.rows[ri],col=G.cols[ci];
  const cd=G.cells.find(c=>c.row===row.id&&c.col===col.id);
  document.getElementById('crit').innerHTML='<strong>'+row.category+' :</strong> '+row.value+'<br><strong>Drapeau :</strong> '+col.label;
  const rh=document.getElementById('rhint');
  rh.innerHTML='<div class="lp" style="background:var('+PCLS[cd.rc-1]+');width:8px;height:8px;border-radius:50%"></div>'+CLBL[cd.rc]+' — 1er essai : <strong>'+BASE[1]*CM[cd.rc]+' pts</strong>';
  clearSel();
  document.getElementById('err').textContent='';
  document.getElementById('overlay').classList.add('open');
  updTries();
  setTimeout(()=>document.getElementById('inp').focus(),80);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  aCell=null;selC=null;hideSugs();
}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function hi(text,q){
  const ti=norm(text),qi=norm(q);const i=ti.indexOf(qi);
  if(i<0)return text;
  return text.slice(0,i)+'<em>'+text.slice(i,i+q.length)+'</em>'+text.slice(i+q.length);
}

document.getElementById('inp').addEventListener('input',function(){
  selC=null;document.getElementById('bok').disabled=true;
  const q=this.value;if(!q){hideSugs();return;}
  // Suggestions: name only, no flag emoji
  const ms=COUNTRIES.filter(c=>norm(c.name).includes(norm(q))).slice(0,9);
  if(!ms.length){hideSugs();return;}
  const box=document.getElementById('sugs');
  box.innerHTML=ms.map(c=>'<div class="sug" data-id="'+c.id+'">'+hi(c.name,q)+'</div>').join('');
  box.querySelectorAll('.sug').forEach(el=>{
    el.addEventListener('mousedown',e=>{e.preventDefault();setSel(CM2[el.dataset.id]);});
  });
  box.classList.add('open');
});
document.getElementById('inp').addEventListener('blur',()=>setTimeout(hideSugs,150));
function hideSugs(){document.getElementById('sugs').classList.remove('open');}

function setSel(c){
  selC=c;
  // Flag appears here — after choosing, before validating
  document.getElementById('scflag').textContent=c.flag;
  document.getElementById('scname').textContent=c.name;
  document.getElementById('selc').classList.add('on');
  document.getElementById('iwrap').style.display='none';
  document.getElementById('bok').disabled=false;
  document.getElementById('err').textContent='';
  hideSugs();
}
function clearSel(){
  selC=null;
  document.getElementById('selc').classList.remove('on');
  document.getElementById('iwrap').style.display='';
  document.getElementById('inp').value='';
  document.getElementById('bok').disabled=true;
  setTimeout(()=>document.getElementById('inp').focus(),30);
}

function submit(){
  if(!aCell||!selC)return;
  const[ri,ci]=aCell;
  const cd=G.cells.find(c=>c.row===G.rows[ri].id&&c.col===G.cols[ci].id);
  if(cd.valid.includes(selC.id)){
    const pts=BASE[TR[ri][ci]+1]*CM[cd.rc];
    SC+=pts;ST[ri][ci]=selC.id;save();updSc();
    const done=updProg();
    const cellEl=document.querySelector('.cell[data-row="'+ri+'"][data-col="'+ci+'"]');
    cellEl.innerHTML='';fillCell(cellEl,ri,ci,cd);
    cellEl.classList.add('pop');setTimeout(()=>cellEl.classList.remove('pop'),400);
    closeModal();
    if(done===9)setTimeout(showEnd,600);
  }else{
    TR[ri][ci]++;save();updTries();
    const cellEl=document.querySelector('.cell[data-row="'+ri+'"][data-col="'+ci+'"]');
    cellEl.classList.add('wrong');setTimeout(()=>cellEl.classList.remove('wrong'),400);
    if(TR[ri][ci]>=MAX_T){
      document.getElementById('err').textContent='Plus d\'essais pour cette case.';
      setTimeout(()=>{
        cellEl.classList.add('locked');
        cellEl.innerHTML='<span class="plus" style="font-size:16px;color:#bbb">✕</span>';
        updProg();closeModal();
      },1000);
    }else{
      document.getElementById('err').textContent=selC.name+' ne correspond pas. '+(MAX_T-TR[ri][ci])+' essai(s) restant(s).';
      clearSel();
    }
  }
}

// ── Share system ──────────────────────────────────────────────────────────────
let shareText='';

function buildShareText(){
  const found=ST.flat().filter(Boolean).length;
  const maxPts=G.cells.reduce((a,cd)=>a+BASE[1]*CM[cd.rc],0)+BONUS;
  let grid='';
  for(let r=0;r<3;r++){
    for(let c=0;c<3;c++){
      const t=TR[r][c];
      grid+=ST[r][c]?(t===0?'🟩':t===1?'🟨':'🟧'):TR[r][c]>=MAX_T?'🟥':'⬛';
    }
    grid+='\n';
  }
  const today=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  return 'J\'ai joué à Flagoku ce '+today+' !\nScore : '+SC+'/'+maxPts+'\nhttps://flagoku.fr\n\n'+grid;
}

function shareCopy(){
  navigator.clipboard.writeText(shareText).then(()=>{
    const b=document.getElementById('sb-copy');
    b.innerHTML='<span class="share-icon">✓</span>Copié !';
    b.classList.add('cp');
    setTimeout(()=>{b.innerHTML='<span class="share-icon">📋</span>Copier';b.classList.remove('cp');},2000);
  });
}

function shareNative(){
  if(navigator.share){
    navigator.share({text:shareText}).catch(()=>{});
  }
}

function shareWA(e){
  e.preventDefault();
  window.open('https://wa.me/?text='+encodeURIComponent(shareText),'_blank');
}

function shareMail(e){
  e.preventDefault();
  const subject=encodeURIComponent('Flagoku — mes résultats du jour !');
  window.location.href='mailto:?subject='+subject+'&body='+encodeURIComponent(shareText);
}

function shareSMS(e){
  e.preventDefault();
  // Works on iOS & Android
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const sep=isIOS?'&':'?';
  window.location.href='sms:'+sep+'body='+encodeURIComponent(shareText);
}

// ── End screen ────────────────────────────────────────────────────────────────
function showEnd(){
  const found=ST.flat().filter(Boolean).length;
  const maxPts=G.cells.reduce((a,cd)=>a+BASE[1]*CM[cd.rc],0)+BONUS;
  if(found===9){SC+=BONUS;save();updSc();}
  const pct=Math.round(SC/maxPts*100);

  document.getElementById('eicon').textContent=found===9?'🏆':found>=6?'👏':found>=3?'🤔':'💪';
  document.getElementById('etitle').textContent=found===9?'Grille complète !':found+'/9 cases trouvées';
  document.getElementById('escore').textContent=SC+' pts';
  document.getElementById('esub').innerHTML=
    pct+'% du score maximum ('+maxPts+' pts)'+
    (found===9?'<br>+'+BONUS+' pts bonus grille complète !':'')+
    '<br>Niveau : <strong>'+G.difficulty_label+'</strong> — Grille #'+G.id;

  shareText=buildShareText();
  document.getElementById('sharebox').textContent=shareText;

  // Show native share button if supported
  if(navigator.share){
    document.getElementById('sb-native').style.display='flex';
  }

  document.getElementById('end').classList.add('open');
  document.getElementById('end').scrollIntoView({behavior:'smooth',block:'nearest'});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&!document.getElementById('bok').disabled)submit();
});
function mk(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
init();
</script>
